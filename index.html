<!doctype html>
<html lang="en" data-theme="cute">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Peach of a Word</title>
    <meta
      name="description"
      content="Peach of a Word. Make words from eight scrambled letters, then find the source word they all came from. A quiet daily word game."
    />
    <meta name="theme-color" content="#fff4ee" />
    <link rel="canonical" href="%VITE_SITE_URL%/" />

    <!-- Icons: the tab icon follows the theme. It is set before the first paint
         by the script below and swapped on toggle. The default is the cute
         peach, the default theme, so a fresh visitor never sees a stale icon. -->
    <link
      rel="icon"
      id="favicon"
      href="/favicon-cute.svg"
      type="image/svg+xml"
    />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <script>
      // No-flash theme and tab icon: resolve the saved theme (or the default)
      // and apply both to the document and the favicon before the first paint,
      // so a fresh visitor never sees the wrong theme or a stale icon.
      (function () {
        var DEFAULT = 'cute';
        var saved;
        try {
          saved = localStorage.getItem('e8-theme');
        } catch (e) {
          saved = null; /* storage blocked: fall back to the default */
        }
        var theme =
          saved === 'cute' || saved === 'letterpress' ? saved : DEFAULT;
        document.documentElement.dataset.theme = theme;
        var icon = document.getElementById('favicon');
        if (icon)
          icon.href =
            theme === 'cute' ? '/favicon-cute.svg' : '/favicon-classic.svg';
      })();
    </script>

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Peach of a Word" />
    <meta property="og:title" content="Peach of a Word" />
    <meta
      property="og:description"
      content="Peach of a Word. Make words from eight scrambled letters, then find the source word they all came from. A quiet daily word game."
    />
    <meta property="og:url" content="%VITE_SITE_URL%/" />
    <meta property="og:image" content="%VITE_SITE_URL%/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="The wordmark Peach of a Word above a row of letterpress type sorts, one in amber."
    />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Peach of a Word" />
    <meta
      name="twitter:description"
      content="Peach of a Word. Make words from eight scrambled letters, then find the source word they all came from. A quiet daily word game."
    />
    <meta name="twitter:image" content="%VITE_SITE_URL%/og.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..700;1,9..144,400..600&family=Spectral:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Fredoka:wght@400;500;600;700&family=Nunito:ital,wght@0,400;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
