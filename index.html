<!doctype html>
<html lang="en" data-theme="cute">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      // No-flash theme: apply the saved theme before the first paint.
      (function () {
        try {
          var t = localStorage.getItem('e8-theme');
          if (t === 'cute' || t === 'letterpress')
            document.documentElement.dataset.theme = t;
        } catch (e) {
          /* storage blocked: fall back to the default attribute */
        }
      })();
    </script>
    <title>Peach of a Word</title>
    <meta
      name="description"
      content="Peach of a Word. Make words from eight scrambled letters, then find the source word they all came from. A quiet daily word game."
    />
    <meta name="theme-color" content="#F1EEE6" />
    <link rel="canonical" href="%VITE_SITE_URL%/" />

    <!-- Icons -->
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Peach of a Word" />
    <meta property="og:title" content="Peach of a Word" />
    <meta
      property="og:description"
      content="Peach of a Word. Make words from eight scrambled letters, then find the source word they all came from. A quiet daily word game."
    />
    <meta property="og:url" content="%VITE_SITE_URL%/" />
    <meta property="og:image" content="%VITE_SITE_URL%/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="The wordmark Peach of a Word above a row of letterpress type sorts, one in amber."
    />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Peach of a Word" />
    <meta
      name="twitter:description"
      content="Peach of a Word. Make words from eight scrambled letters, then find the source word they all came from. A quiet daily word game."
    />
    <meta name="twitter:image" content="%VITE_SITE_URL%/og.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..700;1,9..144,400..600&family=Spectral:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Fredoka:wght@400;500;600;700&family=Nunito:ital,wght@0,400;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
